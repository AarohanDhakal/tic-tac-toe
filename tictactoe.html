<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #restart {
      padding: 12px 32px;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 40px;
      font-size: 1rem;
    }

    .score-item { text-align: center; }
    .score-item span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-item.x-score span { color: #e94560; }
    .score-item.o-score span { color: #a8dadc; }
    .score-item.draw-score span { color: #888; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="score">
    <div class="score-item x-score">X <span id="score-x">0</span></div>
    <div class="score-item draw-score">Draw <span id="score-draw">0</span></div>
    <div class="score-item o-score">O <span id="score-o">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus(`Player ${current}'s turn`);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function handleClick(e) {
      const cell = e.currentTarget;
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winLine = checkWinner();
      if (winLine) {
        winLine.forEach(idx => document.querySelector(`[data-i="${idx}"]`).classList.add('win'));
        setStatus(`Player ${current} wins!`);
        scores[current]++;
        document.getElementById(`score-${current.toLowerCase()}`).textContent = scores[current];
        gameOver = true;
      } else if (board.every(Boolean)) {
        setStatus("It's a draw!");
        scores.draw++;
        document.getElementById('score-draw').textContent = scores.draw;
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`Player ${current}'s turn`);
      }
    }

    scores = { X: 0, O: 0, draw: 0 };
    document.querySelectorAll('.cell').forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('restart').addEventListener('click', init);
    init();
  </script>
</body>
</html>
